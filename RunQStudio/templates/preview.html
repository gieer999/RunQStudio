<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ race_id|upper }} – podgląd</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body><header class="hero compact"><div><div class="eyebrow">PODGLĄD STANDARD RUNQ</div><h1>{{ race_id|upper }} · {{ race.name }} {{ race.year }}</h1><p>Wyświetlono maksymalnie 200 z {{ total }} rekordów.</p></div><a class="btn primary" href="{{ url_for('index') }}">← Dashboard</a></header>
<main><section class="panel"><div class="table-wrap tall"><table><thead><tr>{% for c in columns %}<th>{{ c }}</th>{% endfor %}</tr></thead><tbody>{% for row in rows %}<tr>{% for c in columns %}<td>{{ row[c] }}</td>{% endfor %}</tr>{% endfor %}</tbody></table></div></section></main></body></html>
